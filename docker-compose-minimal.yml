services:
  mongo1:
    image: mongo:6
    container_name: mongo1
    ports:
      - "27027:27017"
    volumes:
      - mongo1_data:/data/db
    command: ["--replSet", "rsGreenCoop"]
    networks:
      - mongo-cluster

  mongo2:
    image: mongo:6
    container_name: mongo2
    ports:
      - "27028:27017"
    volumes:
      - mongo2_data:/data/db
    command: ["--replSet", "rsGreenCoop"]
    networks:
      - mongo-cluster

  mongo3:
    image: mongo:6
    container_name: mongo3
    ports:
      - "27029:27017"
    volumes:
      - mongo3_data:/data/db
    command: ["--replSet", "rsGreenCoop"]
    networks:
      - mongo-cluster

  mongo-setup:
    image: mongo:6
    container_name: mongo-setup
    depends_on:
      - mongo1
      - mongo2
      - mongo3
    volumes:
      - ./scripts-replica:/scripts
    entrypoint: ["/bin/sh", "/scripts/mongo-setup.sh"]
    networks:
      - mongo-cluster
    restart: "no"

volumes:
  mongo1_data:
  mongo2_data:
  mongo3_data:

networks:
  mongo-cluster:
